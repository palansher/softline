<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #first{
            width: 50%;
            height: 300px;
            background-color: red;
            float:left;
        }

       #second{
            width:50%;
            height: 300px;
            background-color: blue;
            float:right;
        }
       #third{
            width:100%;
            height: 300px;
            background-color: orange;
       }
       #clear{
           clear: both;
       }
    </style>
</head>
<body>
    <div id="first"></div>
    <div id="second"></div>
    <div id="clear"></div>
    <div id="third"></div>
</body>
</html>
