{% extends 'base-template.html' %}

{% block title %} DriveX — Каталог {% endblock %}

{% block content %}
<h2 class="text-center mb-5 fw-bold position-relative section-title">Каталог автомобилей</h2>

<div id="catalog-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for item in items %}
    <div class="col">
        <div class="card h-100 border-0 shadow-sm card-car rounded-4 overflow-hidden">
            <div class="card-img-container">
                <img src="{{ url_for('static', filename='img/catalog/%s' | format(item.image_small_path) ) }}"
                    alt="{{ item.brand_name }} {{ item.model_name }}"
                    onerror="this.src='/static/img/no-photo-600x400.svg';">
            </div>
            <div class="card-body d-flex flex-column p-4">
                <span class="text-uppercase text-muted small fw-bold tracking-wider">{{ item.brand_name }}</span>
                <h4 class="card-title fw-bold text-dark mb-3">{{ item.model_name }}</h4>
                <p class="card-text text-secondary flex-grow-1">{{ item.short_info }}</p>

                <div class="mt-3">
                    <div class="text-muted small">Стоимость</div>
                    <div class="fs-4 fw-bold text-dark mb-3">{{ item.price | format_price }}</div>
                    <button class="btn btn-outline-dark w-100 fw-bold rounded-3 btn-buy" data-id="{{ item.car_id }}">
                        Добавить в корзину
                    </button>
                </div>
            </div>
        </div>
    </div>

    {% endfor %}
</div>

<script src="{{ url_for('static', filename='js/catalog.js') }}"></script>

{% endblock %}
