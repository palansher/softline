<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <header class="bg-dark text-white py-3 shadow-sm">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div class="d-flex align-items-center mb-3 mb-md-0">
                <span class="fs-3 fw-bold text-warning me-2">⚡</span>
                <span class="fs-4 text-uppercase">Drive<span class="text-warning">X</span></span>
            </div>

            <nav class="mb-3 mb-md-0">
                <ul class="nav">
                    <li class="nav-item">
                        <a href="{{ url_for('index') }}"
                            class="nav-link px-3 {% if request.endpoint == 'index' %}text-white active-link{% else %}text-white-50{% endif %}">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('catalog') }}"
                            class="nav-link px-3 {% if request.endpoint == 'catalog' %}text-white active-link{% else %}text-white-50{% endif %}">Каталог</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('contacts') }}"
                            class="nav-link px-3 {% if request.endpoint == 'contacts' %}text-white active-link{% else %}text-white-50{% endif %}">Контакты</a>
                    </li>
                </ul>
            </nav>

            <div class="fs-5 fw-semibold">
                <a href="tel:+78007775555" class="text-white text-decoration-none">+7(800)777-5555</a>
            </div>
        </div>
    </header>

    <main class="flex-grow-1 my-5">
        <div class="container">
            {%- filter indent(width=12, first=true) %}
            {% block content %}{% endblock %}
            {%- endfilter %}
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto border-top border-secondary">
        <div
            class="container d-flex flex-column flex-md-row justify-content-between align-items-center text-center text-md-start">
            <div class="mb-3 mb-md-0">
                <p class="mb-1 fw-bold">© 2026 DriveX. Все права защищены.</p>
            </div>
            <div>
                <span class="text-white-50 me-2">Свяжитесь с нами:</span>
                <a href="tel:+78007775555" class="text-warning fs-5 fw-bold text-decoration-none">+7(800)777-5555</a>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
