services:
  db:
    image: postgres:18.4-bookworm
    container_name: postgres-learn-py
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: main_edu_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgres-learn-py/data

volumes:
  pgdata:
    driver: local
