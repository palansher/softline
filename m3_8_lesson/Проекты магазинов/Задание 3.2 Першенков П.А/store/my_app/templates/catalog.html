{% extends 'base_template.html' %}
{% load static %}
<!--Контент-->
{% block content %}
<div class="container my-5 col-md-9">
    <div class="row row-cols-1 row-cols-md-3 mb-3 text-center">
        {% for item in items %}
        <div class="col">
            <div class="card mb-4 rounded-3 shadow-sm">
                <div class="card-header py-3"><h4 class="my-0 fw-normal">{{ item.title }}</h4></div>
                <div class="card-body">
                    <img src="{% static '/pictures/' %}{{ item.photo }}" alt="{{ item.info }}" width="200px">
                    <a href="catalog/{{ item.id }}" type="button" class="w-100 btn btn-lg btn-outline-primary">Перейти</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
