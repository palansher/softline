<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hunting</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<!--    Шапка сайта-->
<div class="container">
    <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom"><a href="/"
                                                                                       class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
        <svg class="bi me-2" width="40" height="32" aria-hidden="true">
            <use xlink:href="#bootstrap"></use>
        </svg>
        <span class="fs-4">Охота по-Большому</span> </a>
        <ul class="nav nav-pills">
            <li class="nav-item"><a href="/" class="nav-link" aria-current="page">Домой</a></li>
            <li class="nav-item"><a href="/catalog" class="nav-link">Каталог</a></li>
            <li class="nav-item"><a href="/contacts" class="nav-link">Контакты</a></li>
            <li class="nav-item"><a href="/cart" class="nav-link">Корзина</a></li>
            <li class="nav-item"><a href="/login" class="nav-link">Вход</a></li>
        </ul>
    </header>
</div>
<!--Контент-->
<div class="container">
    <div class="row">
        <div class="d-flex flex-column flex-shrink-0 p-3 bg-body-tertiary col-md-3" style="width: 280px;">
            <a href="#"
               class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
                <svg class="bi pe-none me-2" width="40" height="32" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg>
                <span class="fs-4">Меню</span> </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="/" class="nav-link" aria-current="page">
                    <svg class="bi pe-none me-2" width="16" height="16" aria-hidden="true">
                        <use xlink:href="/"></use>
                    </svg>
                    Домой
                </a></li>
                <li><a href="/catalog" class="nav-link link-body-emphasis">
                    <svg class="bi pe-none me-2" width="16" height="16" aria-hidden="true">
                        <use xlink:href="/catalog"></use>
                    </svg>
                    Каталог
                </a></li>
                <li><a href="/contacts" class="nav-link link-body-emphasis">
                    <svg class="bi pe-none me-2" width="16" height="16" aria-hidden="true">
                        <use xlink:href="/contacts"></use>
                    </svg>
                    Контакты
                </a></li>
            </ul>
            <hr>
        </div>

            <div class="container my-5 col-md-9" id="content">
                    {% block content %} {% endblock %}
            </div>

    </div>
</div>

<!--Подвал сайта-->

<div class="container fixed-bottom">
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"><p
            class="col-md-4 mb-0 text-body-secondary">© 2026 Охота по-большому</p> <a href="#"
                                                                                 class="col-md-4 d-flex align-items-center justify-content-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"
                                                                                 aria-label="Bootstrap">
        <svg class="bi me-2" width="40" height="32" aria-hidden="true">
            <use xlink:href="#bootstrap"></use>
        </svg>
    </a>
        <ul class="nav col-md-4 justify-content-end">
            <li class="nav-item"><a href="/" class="nav-link">Домой</a></li>
            <li class="nav-item"><a href="/catalog" class="nav-link">Каталог</a></li>
            <li class="nav-item"><a href="/contacts" class="nav-link">Контакты</a></li>
            <li class="nav-item"><a href="/cart" class="nav-link">Корзина</a></li>
            <li class="nav-item"><a href="/login" class="nav-link">Вход</a></li>
        </ul>
    </footer>
</div>
</body>
</html>
