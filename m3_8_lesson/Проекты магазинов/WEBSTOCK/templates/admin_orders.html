{% extends "base.html" %}
{% block content %}
<h1>Заказы</h1>
<table>
    <thead><tr><th>№</th><th>Покупатель</th><th>Телефон</th><th>Дата</th><th>Сумма</th><th>Статус</th><th>Детали</th></tr></thead>
    <tbody>
        {% for o in orders %}
        <tr>
            <td>{{ o.id }}</td><td>{{ o.customer_name }}</td><td>{{ o.phone }}</td>
            <td>{{ o.order_date.strftime('%d.%m.%Y %H:%M') }}</td>
            <td>{{ o.total_amount }} руб.</td><td>{{ o.status }}</td>
            <td><a href="{{ url_for('admin_order_detail', id=o.id) }}" class="btn">Просмотр</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Назад</a>
{% endblock %}
