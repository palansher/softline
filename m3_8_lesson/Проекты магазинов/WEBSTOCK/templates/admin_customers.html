{% extends "base.html" %}
{% block content %}
<h1>Покупатели</h1>
<table>
    <thead><tr><th>ID</th><th>Телефон</th><th>Имя</th><th>Дата регистрации</th><th>Администратор</th></tr></thead>
    <tbody>
        {% for c in customers %}
        <tr>
            <td>{{ c.id }}</td><td>{{ c.phone }}</td><td>{{ c.name }}</td>
            <td>{{ c.created_at.strftime('%d.%m.%Y') }}</td>
            <td>{{ "Да" if c.is_admin == 1 else "Нет" }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Назад</a>
{% endblock %}
