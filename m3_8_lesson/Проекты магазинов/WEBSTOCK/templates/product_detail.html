{% extends "base.html" %}
{% block content %}
<div>
    <h1>{{ product.name }}</h1>
    <img src="{{ url_for('static', filename=product.image_url) }}" alt="{{ product.name }}" style="max-width:400px;">
    <p>{{ product.description }}</p>
    <p><strong>Цена: {{ product.price }} руб.</strong></p>
    <p>На складе: {{ product.stock }} шт.</p>
    <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn btn-success">Добавить в корзину</a>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Назад</a>
</div>
{% endblock %}
