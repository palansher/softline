{% extends "base.html" %}
{% block content %}
<h1>Товары</h1>
<a href="{{ url_for('admin_product_add') }}" class="btn btn-success">Добавить товар</a>
<table>
    <thead><tr><th>ID</th><th>Название</th><th>Цена</th><th>Остаток</th><th>Действия</th></tr></thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p.id }}</td><td>{{ p.name }}</td><td>{{ p.price }}</td><td>{{ p.stock }}</td>
            <td>
                <a href="{{ url_for('admin_product_edit', id=p.id) }}" class="btn">Изменить</a>
                <a href="{{ url_for('admin_product_delete', id=p.id) }}" class="btn btn-danger" onclick="return confirm('Удалить?')">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Назад</a>
{% endblock %}
