{% extends "base.html" %}
{% block content %}
<h1>{{ 'Редактировать' if product else 'Добавить' }} товар</h1>
<form method="post">
    <div><label>Название:</label> <input type="text" name="name" value="{{ product.name if product else '' }}" required></div>
    <div><label>Описание:</label> <textarea name="description" required>{{ product.description if product else '' }}</textarea></div>
    <div><label>Цена:</label> <input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required></div>
    <div><label>Остаток:</label> <input type="number" name="stock" value="{{ product.stock if product else '' }}" required></div>
    <div><label>Изображение (путь в static/):</label> <input type="text" name="image_url" value="{{ product.image_url if product else 'images/default.jpg' }}" placeholder="images/photo.jpg"></div>
    <button type="submit" class="btn">Сохранить</button>
    <a href="{{ url_for('admin_products') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
