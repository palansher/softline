{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow">
      <div class="card-body p-4">
        <h3 class="text-center mb-4"><i class="bi bi-person-plus"></i> Регистрация</h3>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" class="form-control" name="login"
                   value="{{ login|default('') }}" minlength="3" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Телефон</label>
            <input type="tel" class="form-control" name="phone"
                   value="{{ phone|default('') }}" placeholder="+7-XXX-XXX-XX-XX">
          </div>
          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" class="form-control" name="password" minlength="6" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Повторите пароль</label>
            <input type="password" class="form-control" name="password_confirm" required>
          </div>
          <button class="btn btn-success w-100 mb-3">Зарегистрироваться</button>
          <div class="text-center">
            Уже есть аккаунт? <a href="/login">Войти</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
