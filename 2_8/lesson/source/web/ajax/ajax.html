<meta charset="UTF-8">

<div></div>

<script>
    let block = document.querySelector('div');

    // С помощью функции fetch можно сделать асинхронный запрос к серверу. Функция fetch имеет
    // тип возвращаемого значения Promise. Чтобы заставить JS дождаться
    // ответ от сервера используются обработчики промиса - then, catch, finally. Обработчик
    // then выполняется, если ответ от сервер получен успешный, т.е. со статусом 200 OK.
    // Обработчик catch запускается, если запрос к серверу завершился ошибкой.
    // finally - используется, чтобы выполнить действия независимо от ответа

    fetch('phonebook.json') //создали запрос к серверу и получили ответ в виде промиса
        .then(answer => answer.json()) //text - это объект с ответом от сервера.
        // Метод json у данного объекта конвертирует ответ(строку json) в объект(массив объектов) JS
        // Метод json вернет promise
        .then(abonents => {
            abonents.forEach(abonent => {
                block.innerHTML += `Абонент ${abonent.name} имеет телефон ${abonent.phone}<hr>`;
            })
        })

</script>
