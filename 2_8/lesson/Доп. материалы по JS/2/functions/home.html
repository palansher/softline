    }

    function buildDoor(type,size){
        return 'Строим дверь для дома, тип двери: ' + type + ', размер двери: ' + size;
    }
    function buildRoof(type){

    }

    


    function home(order = {}){

        info += buildBase(order.base);

        //Строим окна

        let windows = order.windows;
        for(let i = 1;i <= windows.count;i++){
            info += `Окно №${i}:\n${buildWindow(windows.type)}\n`;
        }

        let doors = order.doors;
        
        for(let door of doors){
            info += `${buildDoor(door.type,door.size)}\n`
        }

        info += buildRoof(order.roof);

        console.log(info);

    }

    home(order);
