<script>
    /*Игрок может войти в казино, если у него минимум 10000р. Если пропустили, то
    он может сделать ставку о том, что сможет угадать случайное число от 1 до 10 за 3
    попытки. Если угадает, то к его исходной сумме добавим его ставку, а если проиграет,
    то из его суммы вычтем сделанную им ставку. Если при задании ставки игрок пытается
    указать значение больше чем его сумма, то просим ввести снова*/

    let money = +prompt('Введите Вашу сумму');
    const MIN_MONEY = 10000;
    const COUNT_TRY = 3;//максимальное количество попыток для угадывания числа

    if (money < MIN_MONEY){
        alert('Недостаточно средств для начала игры!');
    }else{
        while(1){
            let rate;//ввели переменную ставка
            while(1){
                rate = +prompt('Введите Вашу ставку');
                if (rate > money){
                    alert('Ставка не может быть больше Вашей суммы');
                }else{
                    alert('Ставка принимается');
                    break;
                }
            }

            //Начало игры

            const RANDOM_NUMBER = parseInt(Math.random() * 9 + 1);//это число и нужно угадать игроку
            for(let i = 1;i <= COUNT_TRY;i++){
                let answer = +prompt(`Попытка №${i}:`);
                if(answer == RANDOM_NUMBER){
                    money += rate;
                    alert(`Поздравляем! Ваша сумма: ${money}`);
                    break;
                }else{
                    if(i == COUNT_TRY){//ошибся уже 3 раза
                        money -= rate;
                        alert(`Вы проиграли, было загадано: ${RANDOM_NUMBER}, Ваша сумма: ${money}`);
                    }
                }
            }
            if(money >= 1000){
                let answer = prompt('Повторим? (Y/N)');
                if(answer == 'N'){
                    alert('Хорошо! До свидания!');
                    break;
                }
            }else{
                alert('Игра завершена! До свидания!');
                break;
            }
        }
    }

</script>

Практика - если после проигрыша или выигрыша у игрока еще осталась сумма более 1000, то 
предлагаем ему сыграть еще раз. Если соглашается - то игра запускается снова
