<script>
    let numberDay = +prompt('Введите номер дня недели');

    //Проверка на число
    //Если унарный оператор + применяем не к числу, то получаем значение NaN
    if(!isNaN(numberDay)){//значит ввели число
        if (numberDay > 0 && numberDay <= 7){
            alert((numberDay == 6 || numberDay == 7) ? 'Выходной день' : 'Будний день');
        }else{
            alert('Некорректный номер дня недели!');
        }
    }else{
        alert('Вы ввели нечисловое значение!')
    }


    
</script>
