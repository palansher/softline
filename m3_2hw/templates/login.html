{% extends 'base-template.html' %}

{% block title %} DriveX — Вход {% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
            <h2 class="text-center fw-bold mb-4">Вход в аккаунт</h2>
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email адрес</label>
                    <input type="email" class="form-control rounded-3 py-2" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Пароль</label>
                    <input type="password" class="form-control rounded-3 py-2" id="password" name="password" placeholder="Введите ваш пароль" required>
                </div>
                
                <button type="submit" class="btn btn-warning w-100 fw-bold rounded-3 py-2 text-dark">
                    Войти
                </button>
            </form>
            
            <div class="text-center mt-4">
                <span class="text-muted">Нет аккаунта?</span>
                <a href="{{ url_for('register') }}" class="text-warning fw-bold text-decoration-none ms-1">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
